name: Daily Indicator Update

on:
  schedule:
    - cron: "0 0 * * *" # UTC 00:00 = KST(UTC+9) 09:00 — 아침 실행
    - cron: "0 8 * * *" # UTC 08:00 = KST 17:00 — 오후 재실행(아침 실패 시 자동 만회)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    # 실패 시 알림 이슈를 열 수 있도록 issues 쓰기 권한 부여(감지 레이어).
    permissions:
      contents: read
      issues: write
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      # NAVER API HUB 키 하나로 뉴스·검색어트렌드를 모두 호출한다.
      NAVER_HUB_KEY_ID: ${{ secrets.NAVER_HUB_KEY_ID }}
      NAVER_HUB_KEY: ${{ secrets.NAVER_HUB_KEY }}
      KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
      ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
      ALADIN_TTB_KEY: ${{ secrets.ALADIN_TTB_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
      TELEGRAM_CHANNELS_SHEET_ID: ${{ secrets.TELEGRAM_CHANNELS_SHEET_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r data-pipeline/requirements.txt


      - name: Fetch KOSPI 52-week-high gap
        id: kospi_high_gap
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_kospi_high_gap.py

      - name: Fetch Buffett index
        id: buffett_index
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_buffett_index.py

      - name: Fetch consumer sentiment (CCSI · 실물 축)
        id: consumer_sentiment
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_consumer_sentiment.py

      - name: Fetch turnover concentration (거래대금 쏠림)
        id: turnover_concentration
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_turnover_concentration.py

      - name: Fetch Naver search trend
        id: naver_trend
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_naver_trend.py

      - name: Fetch Naver luxury/import car search trend
        id: naver_luxury_car_trend
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_naver_luxury_car_trend.py

      - name: Fetch Naver lifestyle search trend (fine dining, small business crisis)
        id: naver_lifestyle_trend
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_naver_lifestyle_trend.py

      - name: Fetch DCInside stock gallery sentiment
        id: dcinside
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_dcinside_stock.py

      - name: Fetch KOSPI trading value surge
        id: kospi_volume
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_kospi_volume.py

      - name: Fetch VKOSPI
        id: vkospi
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_vkospi.py

      - name: Fetch VIX-vs-VKOSPI spread
        id: vix_vkospi_spread
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_vix_vkospi_spread.py

      - name: Fetch option put/call ratio
        id: put_call_ratio
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_put_call_ratio.py

      - name: Fetch news headline sentiment
        id: news_sentiment
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_news_sentiment.py

      - name: Fetch KOSPI-vs-gold ratio
        id: gold_ratio
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_gold_ratio.py

      - name: Fetch KOSDAQ-vs-KOSPI ratio
        id: kosdaq_ratio
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_kosdaq_ratio.py

      - name: Fetch USD/KRW volatility
        id: usdkrw_volatility
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_usdkrw_volatility.py

      - name: Fetch leverage ETF trade value + KOSPI200 futures open interest
        id: leverage_etf
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_leverage_etf_volume.py

      - name: Fetch bestseller finance book ratio
        id: bestseller_ratio
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_bestseller_ratio.py

      - name: Fetch YouTube finance search views
        id: youtube_finance_search
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_youtube_finance_search.py


      - name: Fetch KOSPI-vs-Asia relative strength
        id: asia_relative_strength
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_asia_relative_strength.py

      - name: Fetch Upbit speculation index
        id: upbit_speculation
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_upbit_speculation.py


      - name: Fetch GitHub trading bot repo count
        id: github_trading_repos
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_github_trading_repos.py

      - name: Fetch brokerage app store rank
        id: brokerage_app_rank
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_brokerage_app_rank.py

      - name: Fetch individual investor net buying
        id: individual_net_buy
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_individual_net_buy.py

      - name: Fetch investor deposit (대기 매수 자금)
        id: investor_deposit
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_investor_deposit.py

      - name: Fetch market actions (sidecar/CB) index
        id: market_actions
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_market_actions.py

      - name: Calculate overheating score
        id: calculate_score
        continue-on-error: true
        run: python data-pipeline/scripts/calculate_score.py

      # 위 스텝들이 전부 success 여도 데이터가 안 들어왔을 수 있다 — 소스가 자료를
      # 안 주면 fetch 는 "휴장일 등 N건 제외"만 찍고 정상 종료하기 때문이다. 자료
      # 기준일이 허용 영업일을 넘기면 여기서 실패시켜 알림이 뜨게 한다.
      - name: Check indicator freshness (자료 정체 감시)
        id: check_freshness
        continue-on-error: true
        run: python data-pipeline/scripts/check_freshness.py

      # 점수 계산 뒤, 최신 daily_score/지표들을 LLM으로 2~3문장 요약해
      # daily_score.ai_summary에 저장한다(히어로 카드용). 비필수 단계라
      # continue-on-error로 돌리고, 아래 실패 집계(Summarize results)에는
      # 넣지 않는다 — 요약 생성 실패가 실패 알림 이슈를 열지 않도록.
      - name: Generate daily AI summary (히어로 요약)
        id: generate_daily_summary
        continue-on-error: true
        run: python data-pipeline/scripts/generate_daily_summary.py

      # ── 카더라 리포트(텔레그램) 파이프라인 ──────────────────────────────
      # 위 지표 파이프라인과 독립적이며, 자기들끼리는 순서 의존이 있다:
      #   상장사 사전 → 채널 동기화/구독자 스냅샷 → 메시지 수집 → 채널 영향력
      #   → 종목 추출 → 종목 일별 집계.
      # 각 스텝은 DB에서 읽어 이어가므로 하나가 실패해도 다음 스텝은 직전까지의
      # 저장분으로 동작한다(graceful degradation). 지표용 실패 알림/요약과는
      # 분리하려고 아래 Summarize results 집계 배열에는 넣지 않는다.
      - name: (텔레그램) KRX 상장종목 마스터 갱신
        id: telegram_krx_stocks
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_krx_stocks.py


      - name: (텔레그램) 채널 동기화 + 구독자 스냅샷
        id: telegram_sync
        continue-on-error: true
        run: python data-pipeline/scripts/sync_telegram_channels.py

      - name: (텔레그램) 메시지 수집
        id: telegram_fetch
        continue-on-error: true
        run: python data-pipeline/scripts/fetch_telegram.py

      - name: (텔레그램) 채널 영향력 점수
        id: telegram_influence
        continue-on-error: true
        run: python data-pipeline/scripts/calculate_channel_influence.py

      - name: (텔레그램) 종목 추출
        id: telegram_extract
        continue-on-error: true
        run: python data-pipeline/scripts/extract_telegram_stocks.py

      - name: (텔레그램) 종목 일별 집계
        id: telegram_stock_daily
        continue-on-error: true
        run: python data-pipeline/scripts/calculate_stock_daily.py

      - name: (텔레그램) 테마 일별 집계
        id: telegram_theme_daily
        continue-on-error: true
        run: python data-pipeline/scripts/calculate_theme_daily.py

      # LLM 계층 — 메시지별 분류(돈이 드는 단계, 증분) → 결정적 집계 → 문장 생성.
      # 분류가 실패해도 집계는 직전까지 저장된 분류분으로 돌고, 집계가 실패하면
      # 문장 생성이 조용히 건너뛴다. 위 스텝들과 마찬가지로 실패 알림과는 분리한다.
      - name: (텔레그램) 메시지 LLM 분류
        id: telegram_analyze
        continue-on-error: true
        run: python data-pipeline/scripts/analyze_telegram_messages.py

      - name: (텔레그램) 센티먼트·화제어 집계
        id: telegram_sentiment
        continue-on-error: true
        run: python data-pipeline/scripts/calculate_telegram_sentiment.py

      - name: (텔레그램) 총평·종목 요약 생성
        id: telegram_narratives
        continue-on-error: true
        run: python data-pipeline/scripts/generate_telegram_narratives.py

      - name: Summarize results
        if: always()
        run: |
          names=("fetch_kospi_high_gap.py" "fetch_buffett_index.py" "fetch_consumer_sentiment.py" "fetch_turnover_concentration.py" "fetch_naver_trend.py" "fetch_naver_luxury_car_trend.py" "fetch_naver_lifestyle_trend.py" "fetch_dcinside_stock.py" "fetch_kospi_volume.py" "fetch_vkospi.py" "fetch_vix_vkospi_spread.py" "fetch_put_call_ratio.py" "fetch_news_sentiment.py" "fetch_gold_ratio.py" "fetch_kosdaq_ratio.py" "fetch_usdkrw_volatility.py" "fetch_leverage_etf_volume.py" "fetch_bestseller_ratio.py" "fetch_youtube_finance_search.py" "fetch_asia_relative_strength.py" "fetch_upbit_speculation.py" "fetch_github_trading_repos.py" "fetch_brokerage_app_rank.py" "fetch_individual_net_buy.py" "fetch_investor_deposit.py" "fetch_market_actions.py" "calculate_score.py" "check_freshness.py")
          outcomes=("${{ steps.kospi_high_gap.outcome }}" "${{ steps.buffett_index.outcome }}" "${{ steps.consumer_sentiment.outcome }}" "${{ steps.turnover_concentration.outcome }}" "${{ steps.naver_trend.outcome }}" "${{ steps.naver_luxury_car_trend.outcome }}" "${{ steps.naver_lifestyle_trend.outcome }}" "${{ steps.dcinside.outcome }}" "${{ steps.kospi_volume.outcome }}" "${{ steps.vkospi.outcome }}" "${{ steps.vix_vkospi_spread.outcome }}" "${{ steps.put_call_ratio.outcome }}" "${{ steps.news_sentiment.outcome }}" "${{ steps.gold_ratio.outcome }}" "${{ steps.kosdaq_ratio.outcome }}" "${{ steps.usdkrw_volatility.outcome }}" "${{ steps.leverage_etf.outcome }}" "${{ steps.bestseller_ratio.outcome }}" "${{ steps.youtube_finance_search.outcome }}" "${{ steps.asia_relative_strength.outcome }}" "${{ steps.upbit_speculation.outcome }}" "${{ steps.github_trading_repos.outcome }}" "${{ steps.brokerage_app_rank.outcome }}" "${{ steps.individual_net_buy.outcome }}" "${{ steps.investor_deposit.outcome }}" "${{ steps.market_actions.outcome }}" "${{ steps.calculate_score.outcome }}" "${{ steps.check_freshness.outcome }}")

          {
            echo "## Daily update summary"
            echo "| Script | Result |"
            echo "|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          failed=0
          failed_list=""
          for i in "${!names[@]}"; do
            script="${names[$i]}"
            outcome="${outcomes[$i]}"
            echo "$script: $outcome"
            if [ "$outcome" = "success" ]; then
              echo "| $script | success |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $script | $outcome |" >> "$GITHUB_STEP_SUMMARY"
              failed=1
              failed_list="${failed_list:+$failed_list, }$script"
            fi
          done

          if [ "$failed" = "1" ]; then
            # 실패한 스크립트 목록을 다음(알림) 스텝에서 쓸 수 있게 넘긴다.
            echo "FAILED_SCRIPTS=$failed_list" >> "$GITHUB_ENV"
            echo "One or more scripts failed. Check the step logs above for details."
            exit 1
          fi

      # 감지 레이어: 실행이 실패하면 알림용 GitHub 이슈를 열거나(없으면) 코멘트를
      # 추가한다. 별도 외부 설정 없이 기본 GITHUB_TOKEN만 쓴다. 같은 제목의 열린
      # 이슈가 있으면 새로 만들지 않고 코멘트만 달아 스팸을 막는다.
      - name: Alert on failure (open/update GitHub issue)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          failed="${FAILED_SCRIPTS:-요약 탭에서 확인}"
          title="⚠️ 데일리 파이프라인 실패"
          note=$(printf '데일리 업데이트 실행이 실패했습니다.\n\n- 시각(UTC): %s\n- 실패 스텝: %s\n- 로그/요약: %s\n\n다음 예약 실행(하루 2회)이 성공하면 데이터는 자동으로 만회됩니다. 계속 실패하면 확인이 필요합니다.' \
            "$(date -u '+%Y-%m-%d %H:%M')" "$failed" "$run_url")
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$note"
            echo "기존 알림 이슈 #$existing 에 코멘트 추가"
          else
            gh issue create --title "$title" --body "$note"
            echo "새 알림 이슈 생성"
          fi
